<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nutsy Nope — Ingredient Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #EEF6FB;
    --bg2:          #DFF0F9;
    --surface:      #FFFFFF;
    --surface2:     #F0F8FD;
    --border:       #C4DFF0;
    --border2:      #A8CFEA;
    --text:         #1A3344;
    --text2:        #4A6E85;
    --text3:        #8AADC2;
    --accent:       #1A8FBF;
    --accent-hover: #136E96;
    --accent-light: #D6EEF8;
    --danger-bg:    #FEF0EE;
    --danger-bdr:   #F0A898;
    --danger-txt:   #8B2010;
    --warn-bg:      #FEF8EA;
    --warn-bdr:     #EDD080;
    --warn-txt:     #6B4A08;
    --safe-bg:      #EDFBF2;
    --safe-bdr:     #80D4A0;
    --safe-txt:     #0A5E2A;
    --rare-bg:      #F2F6FA;
    --rare-bdr:     #B0C8DC;
    --rare-txt:     #3A5570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  /* ── Header ── */
  .site-header {
    background: linear-gradient(135deg, #1A8FBF 0%, #1570A0 100%);
    padding: 1.75rem 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 2px 12px rgba(26,111,159,0.18);
  }
  .site-logo {
    font-family: 'Lora', serif;
    font-size: 2.25rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .site-logo em {
    font-style: italic;
    color: #B8E4F5;
  }
  .site-tagline {
    font-size: 0.8125rem;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* ── Layout ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 2px 8px rgba(26,111,159,0.06);
  }
  .card-title {
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 1rem;
  }

  /* ── Avoid list ── */
  .input-row { display: flex; gap: 8px; margin-bottom: 0.875rem; }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9375rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .input-row input:focus { border-color: var(--accent); background: #fff; }
  .input-row input::placeholder { color: var(--text3); }

  .btn-add {
    padding: 10px 22px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9375rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent-hover); }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; min-height: 28px; align-items: center; }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-light);
    color: var(--accent-hover);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 10px 4px 14px;
    font-size: 0.8125rem;
    font-weight: 600;
  }
  .tag button {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 1.1rem; line-height: 1;
    padding: 0 2px; display: flex; align-items: center;
    transition: color 0.1s;
  }
  .tag button:hover { color: var(--accent-hover); }
  .empty-hint { font-size: 0.8125rem; color: var(--text3); font-style: italic; }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 0.875rem; }
  .search-wrap input {
    width: 100%;
    padding: 11px 42px 11px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9375rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); background: #fff; }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none; font-size: 1rem;
  }

  /* Autocomplete dropdown */
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: var(--surface); border: 1.5px solid var(--border2);
    border-top: none; border-radius: 0 0 10px 10px;
    max-height: 220px; overflow-y: auto;
    box-shadow: 0 6px 18px rgba(26,111,159,0.12);
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .ac-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; cursor: pointer;
    font-size: 0.875rem; color: var(--text);
    transition: background 0.1s;
    border-bottom: 1px solid var(--bg2);
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: var(--accent-light); }
  .ac-thumb {
    width: 36px; height: 36px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0;
    background: var(--bg2);
  }
  .ac-name { font-weight: 600; }
  .ac-loading { padding: 10px 14px; font-size: 0.8125rem; color: var(--text3); font-style: italic; }

  .btn-analyze {
    width: 100%; padding: 12px;
    background: var(--accent); color: white; border: none; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.01em;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-analyze:hover { background: var(--accent-hover); }
  .btn-analyze:active { transform: scale(0.99); }
  .btn-analyze:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; transform: none; }

  /* ── Loading ── */
  .loading-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem 1.5rem;
    text-align: center; margin-bottom: 1.25rem;
    box-shadow: 0 2px 8px rgba(26,111,159,0.06);
  }
  .loading-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 1rem; }
  .loading-dots span {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); opacity: 0.3;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.25;transform:scale(0.75)} 50%{opacity:1;transform:scale(1)} }
  .loading-title { font-family: 'Lora', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 4px; }
  .loading-sub { font-size: 0.8125rem; color: var(--text2); }

  /* ── Results ── */
  .result-thumb {
    width: 100%; max-height: 220px; object-fit: cover;
    border-radius: 10px; margin-bottom: 1.25rem; display: block;
  }
  .result-name {
    font-family: 'Lora', serif; font-size: 1.65rem;
    font-weight: 600; color: var(--text); margin-bottom: 4px;
  }
  .result-desc { font-size: 0.875rem; color: var(--text2); line-height: 1.55; margin-bottom: 6px; }
  .result-meta { font-size: 0.75rem; color: var(--text3); }
  .result-meta a { color: var(--accent); text-decoration: none; }
  .result-meta a:hover { text-decoration: underline; }

  /* ── Alert boxes ── */
  .alert-box { border-radius: 10px; padding: 1rem 1.125rem; margin-bottom: 0.875rem; }
  .alert-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .alert-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .alert-label { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 0.8125rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; }

  .alert-danger { background: var(--danger-bg); border: 1px solid var(--danger-bdr); }
  .alert-danger .alert-label { color: var(--danger-txt); }
  .chip-danger { background: #FACFC8; color: var(--danger-txt); }

  .alert-warn { background: var(--warn-bg); border: 1px solid var(--warn-bdr); }
  .alert-warn .alert-label { color: var(--warn-txt); }
  .chip-warn { background: #F8E8A8; color: var(--warn-txt); }

  .alert-safe { background: var(--safe-bg); border: 1px solid var(--safe-bdr); }
  .alert-safe .alert-label { color: var(--safe-txt); }

  .alert-rare { background: var(--rare-bg); border: 1px solid var(--rare-bdr); }
  .alert-rare .alert-label { color: var(--rare-txt); }
  .chip-rare { background: #C8DCE8; color: var(--rare-txt); }

  /* ── Ingredient list ── */
  .ing-toggle {
    font-size: 0.8125rem; color: var(--accent); background: none; border: none;
    cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 600;
    padding: 0; margin-top: 1rem; display: inline-flex; align-items: center; gap: 5px;
  }
  .ing-toggle:hover { color: var(--accent-hover); }

  .ing-section { display: none; margin-top: 1rem; }
  .ing-section.open { display: block; }
  .ing-group { margin-bottom: 1rem; }
  .ing-col-title {
    font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px;
    padding-bottom: 4px; border-bottom: 1.5px solid var(--bg2);
  }
  .ing-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .ing-chip {
    font-size: 0.8125rem; padding: 3px 11px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-weight: 500;
  }
  .ing-chip.flagged {
    background: #FFE8E4; border-color: var(--danger-bdr);
    color: var(--danger-txt); font-weight: 700;
  }

  /* ── Not found ── */
  .not-found-box {
    background: var(--warn-bg); border: 1px solid var(--warn-bdr);
    border-radius: 10px; padding: 1rem 1.125rem;
    font-size: 0.875rem; color: var(--warn-txt); margin-bottom: 1rem;
    line-height: 1.5;
  }

  /* ── Disclaimer ── */
  .disclaimer {
    margin-top: 1rem; padding: 0.875rem 1rem;
    background: var(--bg2); border-radius: 10px;
    border-left: 3px solid var(--accent);
    font-size: 0.75rem; color: var(--text2); line-height: 1.6;
  }
  .disclaimer strong { color: var(--text); }

  /* ── Buttons ── */
  .btn-secondary {
    margin-top: 1rem; padding: 9px 20px;
    background: transparent; border: 1.5px solid var(--accent);
    color: var(--accent); border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 0.875rem; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--accent-light); }

  /* ── History ── */
  .hist-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface2); border-radius: 10px;
    cursor: pointer; border: 1.5px solid transparent; margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .hist-item:hover { border-color: var(--border2); background: var(--surface); }
  .hist-name { font-size: 0.9375rem; font-weight: 600; color: var(--text); }
  .hist-flag { font-size: 0.75rem; font-weight: 700; color: var(--danger-txt); }
  .hist-safe { font-size: 0.75rem; font-weight: 700; color: var(--safe-txt); }

  /* ── Error ── */
  .error-box {
    background: var(--danger-bg); border: 1px solid var(--danger-bdr);
    border-radius: 10px; padding: 1rem 1.125rem;
    font-size: 0.875rem; color: var(--danger-txt);
  }

  /* ── Footer ── */
  .site-footer {
    text-align: center; padding: 2rem 1rem 1rem;
    font-size: 0.75rem; color: var(--text3);
  }
  .site-footer a { color: var(--accent); text-decoration: none; }
  .site-footer a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .site-logo { font-size: 1.75rem; }
    .container { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">Nutsy <em>Nope</em></div>
  <div class="site-tagline">ingredient checker &mdash; not a medical tool</div>
</header>

<div class="container">

  <!-- Avoid list -->
  <div class="card">
    <div class="card-title">Ingredients to avoid</div>
    <div class="input-row">
      <input type="text" id="avoid-input" placeholder="e.g. peanuts, gluten, dairy… (comma-separate multiple)" />
      <button class="btn-add" id="add-btn">Add</button>
    </div>
    <div class="tags" id="tags-container">
      <span class="empty-hint">No ingredients added yet</span>
    </div>
  </div>

  <!-- Search -->
  <div class="card">
    <div class="card-title">Check a dish</div>
    <div class="search-wrap">
      <input type="text" id="food-search" placeholder="Start typing a dish name…" autocomplete="off" />
      <span class="search-icon">&#128269;</span>
      <div class="autocomplete-list" id="ac-list"></div>
    </div>
    <button class="btn-analyze" id="analyze-btn" disabled>Select a dish above to analyze</button>
  </div>

  <div id="results-container"></div>

  <!-- History -->
  <div class="card" id="history-card" style="display:none;">
    <div class="card-title">Recent checks</div>
    <div id="history-list"></div>
  </div>

</div>

<footer class="site-footer">
  Recipe data from <a href="https://www.themealdb.com/" target="_blank">TheMealDB</a>.
  This tool is not a substitute for medical advice — always verify with the food preparer.
</footer>

<script>
// ── State ─────────────────────────────────────────────────
var avoidList = [];
var searchHistory = [];
var selectedMeal = null;   // { idMeal, strMeal, strMealThumb }
var acTimeout = null;

// ── Init ──────────────────────────────────────────────────
(function init() {
  var saved = localStorage.getItem('nn_avoid_list');
  if (saved) { try { avoidList = JSON.parse(saved); renderTags(); } catch(e){} }
})();

// ── Avoid list ────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', addAvoidItem);
document.getElementById('avoid-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addAvoidItem();
});

function addAvoidItem() {
  var input = document.getElementById('avoid-input');
  var val = input.value.trim().toLowerCase();
  if (!val) return;
  val.split(',').forEach(function(part) {
    var item = part.trim();
    if (item && avoidList.indexOf(item) === -1) avoidList.push(item);
  });
  input.value = '';
  renderTags();
  localStorage.setItem('nn_avoid_list', JSON.stringify(avoidList));
}

function removeTag(item) {
  avoidList = avoidList.filter(function(i) { return i !== item; });
  renderTags();
  localStorage.setItem('nn_avoid_list', JSON.stringify(avoidList));
}

function renderTags() {
  var c = document.getElementById('tags-container');
  if (!avoidList.length) { c.innerHTML = '<span class="empty-hint">No ingredients added yet</span>'; return; }
  c.innerHTML = '';
  avoidList.forEach(function(item) {
    var span = document.createElement('span');
    span.className = 'tag';
    span.textContent = item;
    var btn = document.createElement('button');
    btn.innerHTML = '&times;';
    btn.title = 'Remove';
    btn.addEventListener('click', function() { removeTag(item); });
    span.appendChild(btn);
    c.appendChild(span);
  });
}

// ── Autocomplete ──────────────────────────────────────────
var foodSearch = document.getElementById('food-search');
var acList = document.getElementById('ac-list');
var acFocusIndex = -1;

foodSearch.addEventListener('input', function() {
  var q = this.value.trim();
  selectedMeal = null;
  setAnalyzeBtn(false);
  clearTimeout(acTimeout);
  if (q.length < 2) { closeAC(); return; }
  acTimeout = setTimeout(function() { fetchSuggestions(q); }, 280);
});

foodSearch.addEventListener('keydown', function(e) {
  var items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acFocusIndex = Math.min(acFocusIndex + 1, items.length - 1); highlightAC(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acFocusIndex = Math.max(acFocusIndex - 1, 0); highlightAC(items); }
  else if (e.key === 'Enter') { if (acFocusIndex >= 0 && items[acFocusIndex]) items[acFocusIndex].click(); }
  else if (e.key === 'Escape') { closeAC(); }
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) closeAC();
});

function highlightAC(items) {
  items.forEach(function(it, i) { it.classList.toggle('focused', i === acFocusIndex); });
  if (items[acFocusIndex]) items[acFocusIndex].scrollIntoView({ block: 'nearest' });
}

function fetchSuggestions(q) {
  acList.innerHTML = '<div class="ac-loading">Searching…</div>';
  acList.classList.add('open');
  acFocusIndex = -1;
  fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(q))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.meals || !data.meals.length) {
        acList.innerHTML = '<div class="ac-loading">No dishes found — try a different name</div>';
        return;
      }
      acList.innerHTML = '';
      data.meals.slice(0, 8).forEach(function(meal) {
        var div = document.createElement('div');
        div.className = 'ac-item';
        div.innerHTML = '<img class="ac-thumb" src="' + escHtml(meal.strMealThumb) + '/preview" alt="" loading="lazy" />'
          + '<span class="ac-name">' + escHtml(meal.strMeal) + '</span>';
        div.addEventListener('click', function() {
          selectMeal(meal);
        });
        acList.appendChild(div);
      });
      acList.classList.add('open');
    })
    .catch(function() {
      acList.innerHTML = '<div class="ac-loading">Could not reach TheMealDB — check your connection</div>';
    });
}

function selectMeal(meal) {
  selectedMeal = meal;
  foodSearch.value = meal.strMeal;
  closeAC();
  setAnalyzeBtn(true);
}

function closeAC() {
  acList.classList.remove('open');
  acList.innerHTML = '';
  acFocusIndex = -1;
}

function setAnalyzeBtn(ready) {
  var btn = document.getElementById('analyze-btn');
  btn.disabled = !ready;
  btn.textContent = ready ? 'Check for avoided ingredients' : 'Select a dish above to analyze';
}

// ── Analyze ───────────────────────────────────────────────
document.getElementById('analyze-btn').addEventListener('click', function() {
  if (!selectedMeal) return;
  if (!avoidList.length) { alert('Please add at least one ingredient to avoid first.'); return; }
  runAnalysis(selectedMeal);
});

function runAnalysis(meal) {
  showLoading(meal.strMeal);
  fetch('https://www.themealdb.com/api/json/v1/1/lookup.php?i=' + meal.idMeal)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.meals || !data.meals.length) throw new Error('Meal details not found');
      var full = data.meals[0];
      var ingredients = extractIngredients(full);
      var result = flagIngredients(full, ingredients);
      renderResults(result);
      addToHistory(result);
    })
    .catch(function(err) {
      document.getElementById('results-container').innerHTML =
        '<div class="card"><div class="error-box"><strong>Could not load recipe:</strong> ' + escHtml(err.message) + '</div></div>';
    });
}

function extractIngredients(meal) {
  var list = [];
  for (var i = 1; i <= 20; i++) {
    var ing = (meal['strIngredient' + i] || '').trim();
    var mea = (meal['strMeasure' + i] || '').trim();
    if (ing) list.push({ name: ing.toLowerCase(), display: mea ? mea + ' ' + ing : ing });
  }
  return list;
}

function flagIngredients(meal, ingredients) {
  // For each avoided item, check if it appears in any ingredient name
  // Also handle common category expansions
  var expansions = {
    'dairy':    ['milk','cream','butter','cheese','yogurt','yoghurt','creme','fromage','ghee','whey','lactose','ricotta','mozzarella','parmesan','cheddar','brie','gouda','sour cream','ice cream','custard'],
    'gluten':   ['flour','bread','breadcrumb','wheat','barley','rye','semolina','spelt','couscous','soy sauce','malt','beer','pasta','noodle','cracker','biscuit'],
    'nuts':     ['nut','almond','cashew','walnut','pecan','pistachio','hazelnut','macadamia','brazil nut','pine nut','chestnut','peanut','groundnut'],
    'peanuts':  ['peanut','groundnut'],
    'eggs':     ['egg','mayonnaise','mayo'],
    'shellfish':['prawn','shrimp','crab','lobster','crayfish','scallop','oyster','clam','mussel','squid','octopus'],
    'fish':     ['fish','salmon','tuna','cod','anchovy','sardine','mackerel','tilapia','halibut','bass','trout','herring'],
    'soy':      ['soy','soya','tofu','miso','tempeh','edamame','soy sauce','tamari'],
    'sesame':   ['sesame','tahini'],
    'mustard':  ['mustard'],
    'celery':   ['celery','celeriac'],
    'lupin':    ['lupin','lupine'],
    'sulphites':['wine','vinegar','dried fruit','sulfite','sulphite']
  };

  var flagged = [];
  var safe = true;

  avoidList.forEach(function(avoided) {
    var terms = [avoided];
    // add expansion terms if this avoid item is a category
    if (expansions[avoided]) terms = terms.concat(expansions[avoided]);

    ingredients.forEach(function(ing) {
      var hit = terms.some(function(term) {
        return ing.name.indexOf(term) !== -1;
      });
      if (hit) {
        // avoid duplicates
        var already = flagged.some(function(f) { return f.display === ing.display; });
        if (!already) { flagged.push({ display: ing.display, avoided: avoided }); safe = false; }
      }
    });
  });

  return {
    food_name:   meal.strMeal,
    category:    meal.strCategory || '',
    area:        meal.strArea || '',
    thumb:       meal.strMealThumb || '',
    source:      meal.strSource || '',
    youtube:     meal.strYoutube || '',
    ingredients: ingredients,
    flagged:     flagged,
    safe:        safe
  };
}

// ── Render ────────────────────────────────────────────────
function renderResults(r) {
  var container = document.getElementById('results-container');
  var flaggedNames = r.flagged.map(function(f) { return f.display.toLowerCase(); });

  // Meta line
  var metaParts = [];
  if (r.category) metaParts.push(r.category);
  if (r.area) metaParts.push(r.area + ' cuisine');
  if (r.source) metaParts.push('<a href="' + escHtml(r.source) + '" target="_blank">original recipe</a>');
  if (r.youtube) metaParts.push('<a href="' + escHtml(r.youtube) + '" target="_blank">watch video</a>');

  // Flag summary
  var alertHTML = '';
  if (r.safe) {
    alertHTML = '<div class="alert-box alert-safe">'
      + '<div class="alert-head"><div class="alert-dot" style="background:#40B870;"></div>'
      + '<span class="alert-label" style="color:var(--safe-txt);">No flags found</span></div>'
      + '<p style="font-size:0.9rem;color:var(--safe-txt);font-weight:600;">&#10003; None of your avoided ingredients were found in this dish.</p>'
      + '</div>';
  } else {
    // Group flagged by avoided category
    var byCategory = {};
    r.flagged.forEach(function(f) {
      if (!byCategory[f.avoided]) byCategory[f.avoided] = [];
      byCategory[f.avoided].push(f.display);
    });
    alertHTML = '<div class="alert-box alert-danger">'
      + '<div class="alert-head"><div class="alert-dot" style="background:#D64030;"></div>'
      + '<span class="alert-label" style="color:var(--danger-txt);">Avoided ingredients found</span></div>'
      + '<div class="chips">'
      + r.flagged.map(function(f) {
          return '<span class="chip chip-danger">' + escHtml(f.display) + '</span>';
        }).join('')
      + '</div></div>';
  }

  // All ingredients
  var allIngHTML = r.ingredients.map(function(ing) {
    var fl = flaggedNames.some(function(fn) { return fn === ing.display.toLowerCase(); });
    return '<span class="ing-chip' + (fl ? ' flagged' : '') + '">' + escHtml(ing.display) + (fl ? ' ⚑' : '') + '</span>';
  }).join('');

  container.innerHTML = '<div class="card">'
    + (r.thumb ? '<img class="result-thumb" src="' + escHtml(r.thumb) + '" alt="' + escHtml(r.food_name) + '" />' : '')
    + '<div class="result-name">' + escHtml(r.food_name) + '</div>'
    + (metaParts.length ? '<div class="result-meta" style="margin-bottom:1rem;">' + metaParts.join(' &middot; ') + '</div>' : '')
    + alertHTML
    + '<button class="ing-toggle" id="ing-toggle">Show all ingredients &#9660;</button>'
    + '<div class="ing-section" id="ing-section">'
    + '<div class="ing-chips" style="margin-top:0.5rem;">' + allIngHTML + '</div>'
    + '</div>'
    + '<div class="disclaimer"><p><strong>Important:</strong> This tool checks TheMealDB\'s recipe data only. '
    + 'Recipes vary by chef, restaurant, and region. '
    + '<strong>Not a substitute for reading labels, asking restaurant staff, or consulting a medical professional.</strong> '
    + 'Always verify with the food preparer if you have a serious allergy or medical need.</p></div>'
    + '<button class="btn-secondary" id="new-check-btn">+ Check another dish</button>'
    + '</div>';

  document.getElementById('ing-toggle').addEventListener('click', function() {
    var sec = document.getElementById('ing-section');
    var open = sec.classList.toggle('open');
    this.innerHTML = open ? 'Hide ingredients &#9650;' : 'Show all ingredients &#9660;';
  });
  document.getElementById('new-check-btn').addEventListener('click', function() {
    container.innerHTML = '';
    document.getElementById('food-search').value = '';
    selectedMeal = null;
    setAnalyzeBtn(false);
  });
}

function showLoading(name) {
  document.getElementById('results-container').innerHTML =
    '<div class="loading-card">'
    + '<div class="loading-dots"><span></span><span></span><span></span></div>'
    + '<div class="loading-title">Checking ' + escHtml(name) + '&hellip;</div>'
    + '<div class="loading-sub">Loading recipe from TheMealDB</div>'
    + '</div>';
}

// ── History ───────────────────────────────────────────────
function addToHistory(result) {
  searchHistory.unshift({ name: result.food_name, flags: result.flagged.length, result: result });
  if (searchHistory.length > 8) searchHistory.pop();
  renderHistory();
}

function renderHistory() {
  var card = document.getElementById('history-card');
  var list = document.getElementById('history-list');
  if (!searchHistory.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  searchHistory.forEach(function(h) {
    var div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = '<span class="hist-name">' + escHtml(h.name) + '</span>'
      + (h.flags > 0
        ? '<span class="hist-flag">&#9873; ' + h.flags + ' ingredient' + (h.flags !== 1 ? 's' : '') + ' flagged</span>'
        : '<span class="hist-safe">&#10003; No flags</span>');
    div.addEventListener('click', function() {
      renderResults(h.result);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    list.appendChild(div);
  });
}

// ── Utility ───────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
